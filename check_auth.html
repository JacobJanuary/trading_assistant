<!DOCTYPE html>
<html>
<head>
    <title>Check Auth & SSE</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
        }
        #log {
            background: #f0f0f0;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Auth & SSE Test</h1>
    
    <div class="test-section">
        <h2>1. Check Authentication</h2>
        <button onclick="checkAuth()">Check Auth Status</button>
        <div id="auth-result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Test SSE Connection</h2>
        <button onclick="testSSE(false)">Test SSE (no Celery)</button>
        <button onclick="testSSE(true)">Test SSE (with Celery)</button>
        <button onclick="stopSSE()">Stop SSE</button>
        <div id="sse-result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Event Log</h2>
        <button onclick="clearLog()">Clear Log</button>
        <div id="log"></div>
    </div>
    
    <script>
        let eventSource = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = type;
            entry.innerHTML = `[${time}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        async function checkAuth() {
            const resultDiv = document.getElementById('auth-result');
            resultDiv.innerHTML = 'Checking...';
            
            try {
                // Пробуем получить данные, которые требуют авторизации
                const response = await fetch('/api/config/celery_status', {
                    credentials: 'same-origin'
                });
                
                if (response.status === 200) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<span class="success">✓ Authenticated</span><br>' +
                        'USE_CELERY: ' + data.USE_CELERY + '<br>' +
                        'Celery tasks: ' + (data.celery_tasks || []).length;
                    log('Authentication verified', 'success');
                } else if (response.status === 302 || response.status === 401) {
                    resultDiv.innerHTML = '<span class="error">✗ Not authenticated - need to login</span>';
                    log('Not authenticated', 'error');
                } else {
                    resultDiv.innerHTML = '<span class="error">✗ Error: HTTP ' + response.status + '</span>';
                    log('Auth check failed: ' + response.status, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Error: ' + error.message + '</span>';
                log('Auth check error: ' + error.message, 'error');
            }
        }
        
        function stopSSE() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                log('SSE connection closed', 'info');
                document.getElementById('sse-result').innerHTML = 'Connection stopped';
            }
        }
        
        function testSSE(useCelery) {
            stopSSE();
            
            const resultDiv = document.getElementById('sse-result');
            resultDiv.innerHTML = 'Connecting...';
            
            const params = new URLSearchParams({
                score_week_min: 60,
                score_week_max: 80,
                score_month_min: 60,
                score_month_max: 80,
                step: 10,
                max_trades_per_15min: 3,
                use_celery: useCelery ? 'true' : 'false',
                session_id: 'test_' + Date.now()
            });
            
            const url = `/api/efficiency/analyze_30days_progress?${params}`;
            log('Connecting to: ' + url, 'info');
            
            try {
                eventSource = new EventSource(url, { withCredentials: true });
                
                eventSource.onopen = function() {
                    resultDiv.innerHTML = '<span class="success">✓ Connected</span>';
                    log('SSE connection opened', 'success');
                };
                
                eventSource.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        log('Message type=' + data.type + ': ' + JSON.stringify(data), 'success');
                        resultDiv.innerHTML = '<span class="success">✓ Receiving data (type: ' + data.type + ')</span>';
                    } catch (e) {
                        log('Raw message: ' + event.data, 'info');
                    }
                };
                
                eventSource.onerror = function(error) {
                    log('SSE error, readyState=' + eventSource.readyState, 'error');
                    
                    if (eventSource.readyState === 0) {
                        resultDiv.innerHTML = '<span class="info">Reconnecting...</span>';
                    } else if (eventSource.readyState === 2) {
                        resultDiv.innerHTML = '<span class="error">✗ Connection closed</span>';
                        log('Connection closed permanently', 'error');
                        
                        // Проверяем, не редирект ли это на логин
                        fetch(url, { credentials: 'same-origin' })
                            .then(r => {
                                if (r.status === 302 || r.status === 401) {
                                    log('Server returned auth redirect - not logged in!', 'error');
                                    resultDiv.innerHTML += '<br><span class="error">Authentication required!</span>';
                                }
                            });
                    }
                };
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">✗ Error: ' + error.message + '</span>';
                log('Failed to create EventSource: ' + error.message, 'error');
            }
        }
        
        // Check auth on load
        window.onload = function() {
            checkAuth();
        };
    </script>
</body>
</html>
