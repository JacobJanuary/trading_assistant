server {
      # Nginx будет слушать порт 7777
      listen 7777;

      # Указываем IP-адрес, по которому будет доступен сайт
      server_name 10.8.0.1;

      # Правила доступа: разрешаем только с одного IP и запрещаем всем остальным
      allow 10.8.0.0/24;
      allow 127.0.0.1;
      deny all;

      # Увеличенные таймауты для длительных операций анализа (120 минут для 700+ комбинаций)
      proxy_connect_timeout 7200s;
      proxy_send_timeout 7200s;
      proxy_read_timeout 7200s;
      send_timeout 7200s;

      # Настройки для SSE
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Connection '';
      proxy_http_version 1.1;
      chunked_transfer_encoding off;

      access_log /var/log/nginx/trading_assistant_access.log;
      error_log /var/log/nginx/trading_assistant_error.log;

      location / {
          # ИЗМЕНЕНО: используем unix socket вместо порта 5000
          proxy_pass http://unix:/home/elcrypto/trading_assistant/trading_assistant.sock;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /static {
          alias /home/elcrypto/trading_assistant/static;
      }
 }